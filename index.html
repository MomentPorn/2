<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  background:#0a0a0a;
  color:#fff;
  font-family:Arial,sans-serif;
  min-height:100vh;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

/* PLAYER */
.video-box{
  position:relative;
  width:100%;
  aspect-ratio:16/9;
  background:#000;
  border-radius:18px;
  overflow:hidden;
  box-shadow:
    0 0 30px rgba(0,0,0,.8),
    0 0 60px rgba(255,0,0,.15);
}

video{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}

/* FULLSCREEN */
.video-box:fullscreen,
.video-box:-webkit-full-screen{
  width:100vw;
  height:100vh;
  border-radius:0;
}

.video-box:fullscreen video,
.video-box:-webkit-full-screen video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* TITLE */
.title{
  margin-top:18px;
  font-size:24px;
  font-weight:700;
  line-height:1.4;
}

/* TAGS */
.tags{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  margin-top:14px;
}

.tags span{
  background:linear-gradient(135deg,#ff003c,#ff4d4d);
  padding:6px 12px;
  border-radius:999px;
  font-size:12px;
  font-weight:600;
}

/* ACTORS */
.actors{
  display:flex;
  flex-wrap:wrap;
  gap:12px;
  margin-top:20px;
}

.actor{
  display:flex;
  align-items:center;
  gap:10px;
  background:#151515;
  padding:8px 12px;
  border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}

.actor:hover{
  transform:translateY(-3px);
  background:#202020;
}

.actor img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
  border:2px solid #ff003c;
}

/* DESCRIPTION */
.info{
  margin-top:20px;
  background:#111;
  border-radius:14px;
  padding:15px;
  border:1px solid rgba(255,255,255,.05);
}

.info h3{
  margin-bottom:10px;
}

.info p{
  color:#bbb;
  line-height:1.6;
}

/* MOBILE */
@media(max-width:768px){

  .container{
    padding:12px;
  }

  .title{
    font-size:18px;
  }

  .actor{
    width:100%;
  }

}
</style>
</head>

<body>

<div class="container">

  <!-- VIDEO PLAYER -->
  <div class="video-box" id="videoContainer">
    <video id="my-video" controls playsinline>
      <source src="https://vkvd418.okcdn.ru/?expires=1782611406776&srcIp=85.209.19.228&pr=40&srcAg=CHROME&ms=95.163.35.252&type=5&sig=uobbZUFATH4&ct=0&urls=185.180.203.179&clientType=13&appId=512000384397&zs=43&id=15582911072855">
    </video>
  </div>

  <!-- TITLE -->
  <div class="title">
    Brazzers - Reina O'Hara & Danny D - The Power (Outage) Of Cock - Part 1
  </div>

  <!-- TAGS -->
  <div class="tags">
    <span>Anal</span>
    <span>BBC</span>
    <span>DP</span>
  </div>

  <!-- ACTORS -->
  <div class="actors">

    <div class="actor">
      <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQv_LuLHTHdQ4-oJ4tDBRkz61PC90fRH0xezuRQ_Z8Soqu4F0S-PA-mFQI&s=10">
      <span>Reina Ohara</span>
    </div>



  </div>

  <!-- DESCRIPTION -->
  <div class="info">
    <h3>Description</h3>
    <p>Slutty Suspect Sladyen Skaya Takes A DP Pounding At The Police Station GP3063.
    </p>
  </div>

</div>

<script>
const VAST_TAG = "https://s.magsrv.com/v1/vast.php?idz=5954624";

/* Fluid Player + ExoClick */
fluidPlayer("my-video", {
  layoutControls: {
    primaryColor: "#ff003c",
    fillToContainer: true,
    autoPlay: false,
    mute: false,
    allowDownload: false,
    posterImage: ""
  },

  vastOptions: {
    adList: [
      {
        roll: "preRoll",
        vastTag: VAST_TAG
      }
    ]
  }
});

/* Landscape fullscreen */
function lockLandscape() {
  if (screen.orientation && screen.orientation.lock) {
    screen.orientation.lock("landscape").catch(() => {});
  }
}

function unlockOrientation() {
  if (screen.orientation && screen.orientation.unlock) {
    screen.orientation.unlock();
  }
}

document.addEventListener("fullscreenchange", () => {
  if (document.fullscreenElement) {
    lockLandscape();
  } else {
    unlockOrientation();
  }
});

document.addEventListener("webkitfullscreenchange", () => {
  if (document.webkitFullscreenElement) {
    lockLandscape();
  } else {
    unlockOrientation();
  }
});
</script>

</body>
</html>
